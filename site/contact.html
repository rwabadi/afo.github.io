<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="nav">
    <div class="nav__inner container">
      <a class="nav__logo" href="index.html" aria-label="Abadi Family Office — Home">
        <img src="assets/logo/submark.png" alt="Abadi Family Office">
      </a>
      <nav class="nav__links" aria-label="Main">
        <a class="nav__link" href="index.html">Home</a>
        <a class="nav__link" href="about.html">About us</a>
        <a class="nav__link" href="portfolio.html">Portfolio</a>
        <a class="nav__link" href="community.html">Community</a>
        <a class="nav__link" href="news.html">News</a>
        <a class="nav__link" href="contact.html" aria-current="page">Contact</a>
      </nav>
      <div class="nav__lang" aria-label="Language">
        <span class="nav__lang-active">EN</span>
        <span class="nav__lang-dot">·</span>
        <a class="nav__lang-alt" href="es/contact.html" lang="es">ES</a>
      </div>
      <button class="nav__toggle" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="4" y1="6" x2="20" y2="6"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <line x1="4" y1="18" x2="20" y2="18"/>
        </svg>
      </button>
    </div>
  </header>

  <nav class="mobile-menu" id="mobile-menu" aria-label="Mobile">
    <a href="index.html">Home</a>
    <a href="about.html">About us</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="community.html">Community</a>
    <a href="news.html">News</a>
    <a href="contact.html" aria-current="page">Contact</a>
    <a class="mobile-menu__lang" href="es/contact.html" lang="es">Español →</a>
  </nav>

  <main>

    <section class="page-header">
      <div class="container">
        <h1 class="page-header__title">Contact</h1>
        <hr class="divider">
      </div>
    </section>

    <section class="contact-section">
      <div class="container">
        <div class="contact-section__intro">
          <p>For institutional and partnership inquiries.</p>
        </div>
        <form class="contact-form" id="contact-form">
          <div>
            <label for="cf-name">NAME</label>
            <input id="cf-name" name="name" type="text" autocomplete="name" required>
          </div>
          <div>
            <label for="cf-org">ORGANIZATION</label>
            <input id="cf-org" name="organization" type="text" autocomplete="organization">
          </div>
          <div>
            <label for="cf-email">EMAIL</label>
            <input id="cf-email" name="email" type="email" autocomplete="email" required>
          </div>
          <div>
            <label for="cf-message">MESSAGE</label>
            <textarea id="cf-message" name="message" required></textarea>
          </div>
          <div class="contact-form__submit-row">
            <button class="contact-form__submit" type="submit">Send <span class="arrow">→</span></button>
          </div>
        </form>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="footer__inner">
      <img class="footer__submark" src="assets/logo/submark-light.png" alt="">
      <nav class="footer__nav" aria-label="Footer">
        <a href="index.html">Home</a>
        <a href="about.html">About us</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="community.html">Community</a>
        <a href="news.html">News</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="footer__location">Panama City, Panama</div>
      <div class="footer__copy">&copy; Abadi Family Office</div>
    </div>
  </footer>

  <script src="main.js"></script>

</body>
</html>
