<head>
  <meta charset="UTF-8">

  <meta name="description" content="Contacta a Abadi Family Office.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <header class="nav">
    <div class="nav__inner container">
      <a class="nav__logo" href="/es/index.html" aria-label="Abadi Family Office — Inicio">
        <img src="/assets/logo/submark.png" alt="Abadi Family Office">
      </a>
      <nav class="nav__links" aria-label="Principal">
        <a class="nav__link" href="/es/index.html">Inicio</a>
        <a class="nav__link" href="/es/about.html">Nosotros</a>
        <a class="nav__link" href="/es/portfolio.html">Portafolio</a>
        <a class="nav__link" href="/es/community.html">Comunidad</a>
        <a class="nav__link" href="/es/news.html">Noticias</a>
        <a class="nav__link" href="/es/contact.html" aria-current="page">Contacto</a>
      </nav>
      <div class="nav__lang" aria-label="Idioma">
        <a class="nav__lang-alt" href="/contact.html" lang="en">EN</a>
        <span class="nav__lang-dot">·</span>
        <span class="nav__lang-active">ES</span>
      </div>
      <button class="nav__toggle" aria-label="Abrir menú" aria-expanded="false" aria-controls="mobile-menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="4" y1="6" x2="20" y2="6"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <line x1="4" y1="18" x2="20" y2="18"/>
        </svg>
      </button>
    </div>
  </header>

  <nav class="mobile-menu" id="mobile-menu" aria-label="Móvil">
    <a href="/es/index.html">Inicio</a>
    <a href="/es/about.html">Nosotros</a>
    <a href="/es/portfolio.html">Portafolio</a>
    <a href="/es/community.html">Comunidad</a>
    <a href="/es/news.html">Noticias</a>
    <a href="/es/contact.html" aria-current="page">Contacto</a>
    <a class="mobile-menu__lang" href="/contact.html" lang="en">English →</a>
  </nav>

  <main>

    <section class="page-header">
      <div class="container">
        <h1 class="page-header__title">Contacto</h1>
        <hr class="divider">
      </div>
    </section>

    <section class="contact-section">
      <div class="container">
        <div class="contact-section__intro">
          <p>Para consultas institucionales y de alianzas.</p>
        </div>
        <form class="contact-form" id="contact-form">
          <div>
            <label for="cf-name">NOMBRE</label>
            <input id="cf-name" name="nombre" type="text" autocomplete="name" required>
          </div>
          <div>
            <label for="cf-org">ORGANIZACIÓN</label>
            <input id="cf-org" name="organizacion" type="text" autocomplete="organization">
          </div>
          <div>
            <label for="cf-email">CORREO</label>
            <input id="cf-email" name="correo" type="email" autocomplete="email" required>
          </div>
          <div>
            <label for="cf-message">MENSAJE</label>
            <textarea id="cf-message" name="mensaje" required></textarea>
          </div>
          <div class="contact-form__submit-row">
            <button class="contact-form__submit" type="submit">Enviar <span class="arrow">→</span></button>
          </div>
        </form>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="footer__inner">
      <img class="footer__submark" src="/assets/logo/submark-light.png" alt="">
      <nav class="footer__nav" aria-label="Pie de página">
        <a href="/es/index.html">Inicio</a>
        <a href="/es/about.html">Nosotros</a>
        <a href="/es/portfolio.html">Portafolio</a>
        <a href="/es/community.html">Comunidad</a>
        <a href="/es/news.html">Noticias</a>
        <a href="/es/contact.html">Contacto</a>
      </nav>
      <div class="footer__location">Ciudad de Panamá, Panamá</div>
      <div class="footer__copy">&copy; Abadi Family Office</div>
    </div>
  </footer>

  <script src="/main.js"></script>

</body>
</html>
